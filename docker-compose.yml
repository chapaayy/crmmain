x-logging: &default-logging
  driver: json-file
  options:
    max-size: ${LOG_MAX_SIZE:-10m}
    max-file: ${LOG_MAX_FILE:-3}

x-backend-image: &backend-image
  image: ${BACKEND_IMAGE:-polybags-crm-backend}:${APP_VERSION:-latest}
  build:
    context: .
    dockerfile: apps/backend/Dockerfile

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate:
    <<: *backend-image
    restart: "no"
    logging: *default-logging
    env_file:
      - .env
    command: ["npm", "run", "prisma:migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    <<: *backend-image
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT}
      UPLOADS_DIR: ${UPLOADS_DIR}
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "${BACKEND_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    image: ${FRONTEND_IMAGE:-polybags-crm-frontend}:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_CRM_URL: ${NEXT_PUBLIC_CRM_URL}
        CRM_DOMAIN: ${CRM_DOMAIN}
        API_DOMAIN: ${API_DOMAIN}
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:${BACKEND_PORT:-3001}}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    environment:
      PORT: ${FRONTEND_PORT}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_CRM_URL: ${NEXT_PUBLIC_CRM_URL}
      CRM_DOMAIN: ${CRM_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:${BACKEND_PORT:-3001}}
    expose:
      - "${FRONTEND_PORT}"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "caddy validate --config /etc/caddy/Caddyfile >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  backup:
    image: postgres:16-alpine
    restart: "no"
    logging: *default-logging
    profiles:
      - backup
    env_file:
      - .env
    volumes:
      - backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      set -eu
      mkdir -p /backups
      timestamp=$$(date +%Y%m%d-%H%M%S)
      file="/backups/$${POSTGRES_DB}-$${timestamp}.dump"
      PGPASSWORD="$${POSTGRES_PASSWORD}" pg_dump -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -Fc -f "$${file}"
      find /backups -type f -name "*.dump" -mtime +$${BACKUP_RETENTION_DAYS:-14} -delete
      echo "Backup created: $${file}"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  caddy_data:
  caddy_config:
  backups:
